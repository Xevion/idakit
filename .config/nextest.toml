# The integration tests (`kind(test)`) each bring up the IDA kernel: `init_library` is a
# process global run once per process, and idalib opens the database file in place and locks
# it. nextest isolates tests in their own processes, but still runs them concurrently -- so
# two kernel tests would race on that on-disk database. Cap the whole set to one at a time.
[test-groups]
serial-kernel = { max-threads = 1 }

# A kernel fatal that the facade traps but that leaks a held qmutex turns "clean crash" into a
# silent deadlock on the next kernel call. terminate-after bounds that: a wedged kernel test is
# killed (and fails) rather than hanging the suite. The period is generous so a legitimately
# slow open/analysis on a large database is not mistaken for a hang.
[[profile.default.overrides]]
filter = 'kind(test)'
test-group = 'serial-kernel'
slow-timeout = { period = "60s", terminate-after = 3 }
