[package]
name = "idakit"
version = "0.0.0"
edition = "2024"
publish = false

[dependencies]
bon = "3.9.3"
idakit-sys = { path = "../idakit-sys" }
num_enum = "0.7.6"
snafu = "0.9.1"
strum = { version = "0.28.0", features = ["derive"] }
tracing = "0.1.44"

[[example]]
name = "actor"
path = "examples/actor.rs"

[[example]]
name = "taint"
path = "examples/taint.rs"

[[example]]
name = "analyze"
path = "examples/analyze.rs"

[[example]]
name = "ctree_dump"
path = "examples/ctree_dump.rs"

# No libtest harness: the test owns `fn main()` so it controls the process lifetime
# around the kernel thread that `Ida::run` spawns.
[[test]]
name = "roundtrip"
harness = false

[dev-dependencies]
assert2 = "0.4.0"
proptest = "1.11.0"
rstest = "0.26.1"
