[package]
name = "idakit"
version = "0.0.0"
edition = "2024"
publish = false

[dependencies]
idakit-sys = { path = "../idakit-sys" }
num_enum = "0.7.6"
snafu = "0.9.1"

[[example]]
name = "actor"
path = "examples/actor.rs"

# No libtest harness: the test owns `fn main()` so it controls the process lifetime
# around the kernel thread that `Ida::run` spawns.
[[test]]
name = "roundtrip"
harness = false

[dev-dependencies]
assert2 = "0.4.0"
proptest = "1.11.0"
rstest = "0.26.1"
