[package]
name = "idakit-sys"
version = "0.0.0"
edition = "2024"
publish = false
# Sole linker of native `ida`; lets build.rs publish DEP_IDA_* to dependents.
links = "ida"

[build-dependencies]
cc = "1"

[[example]]
name = "read"
path = "examples/read.rs"

[[example]]
name = "decompile"
path = "examples/decompile.rs"

[[example]]
name = "bytesxref"
path = "examples/bytesxref.rs"

[[example]]
name = "typeinfo"
path = "examples/typeinfo.rs"

[[example]]
name = "writeop"
path = "examples/writeop.rs"
