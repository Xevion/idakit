[package]
name = "idakit-sys"
version = "0.0.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
publish = false
description = "Raw FFI bindings to IDA Pro's idalib runtime and the idakit C++ facade"
keywords = ["ida", "ida-pro", "ffi", "bindings", "reverse-engineering"]
categories = ["external-ffi-bindings", "development-tools"]
# Sole linker of native `ida`; lets build.rs publish DEP_IDA_* to dependents.
links = "ida"

# build.rs detects DOCS_RS and skips the native compile/link (no IDA on docs.rs).
[package.metadata.docs.rs]
default-target = "x86_64-unknown-linux-gnu"
targets = []

[features]
# Compiles the facade's fault-injection shim (`idakit_test_fatal`) so the trap tests can drive
# a fatal through `guarded<>` and prove it is caught. Off by default and never enabled by
# dependents -- the self dev-dependency below turns it on only for this crate's own tests, so
# no `abort()`/`exit()` shim reaches a production build.
test-shims = []

[build-dependencies]
cc = "1"
dirs = "6.0.0"
libloading = "0.9.0"

[dev-dependencies]
idakit-sys = { path = ".", features = ["test-shims"] }

[[example]]
name = "read"
path = "examples/read.rs"

[[example]]
name = "decompile"
path = "examples/decompile.rs"

[[example]]
name = "bytesxref"
path = "examples/bytesxref.rs"

[[example]]
name = "typeinfo"
path = "examples/typeinfo.rs"

[[example]]
name = "writeop"
path = "examples/writeop.rs"
