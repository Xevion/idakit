# Line coverage over the workspace against a real IDA runtime, uploaded to Codecov. Gated on the
# S3_* secrets like `check` is: almost every interesting line needs a live kernel, so a
# runtime-less run would report a coverage collapse rather than no coverage. Linux-x64 only, since
# the answer varies by host only on `#[cfg]`-split code. Reports, never gates.

name: coverage

on:
  push:
    branches: [master] # PR branches run via pull_request; avoids the double run
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coverage:
    name: coverage
    # secrets can't gate a job-level `if`; use a var instead (forks without it skip).
    if: ${{ vars.S3_RUNTIME_CONFIGURED == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: "1"
      RUSTFLAGS: --cfg coverage_nightly
      AWS_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
      AWS_REGION: auto
      S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
      S3_BUCKET: ${{ secrets.S3_BUCKET }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install toolchain
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
      # `coverage(off)` is unstable, so the exceptions need nightly; the override displaces
      # rust-toolchain.toml's pinned stable for this job only.
      - name: Install nightly
        uses: dtolnay/rust-toolchain@4fd1da8b0805d2d2e936788875a7d65dbd677dc2 # nightly
        with:
          toolchain: nightly
          components: llvm-tools-preview
      - name: Override toolchain to nightly
        run: rustup override set nightly
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@ed67fa35ac944f3a9b33f12c4dd43b6f31a47e20 # v2.83.3
        with:
          tool: cargo-llvm-cov@0.8.7
      - name: Fetch IDA runtime
        uses: ./.github/actions/fetch-runtime
        with:
          version: 9.3.260421sp2
          platform: linux-x64
          sdk-tag: v9.3.1-release
      - name: Cache cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Accept IDA EULA
        run: cargo run -q -p idakit --example accept_eula
      - name: Fetch test corpus
        uses: ./.github/actions/fetch-corpus
      # Doctests are left out (`--doctests` is still incomplete); they run under `just test`.
      - name: Run tests with coverage
        run: cargo llvm-cov nextest --workspace --all-features --profile ci --no-fail-fast --hide-progress-bar --failure-output final
      - name: Generate coverage reports
        run: |
          mkdir -p coverage
          cargo llvm-cov report --html --output-dir coverage/html
          cargo llvm-cov report --lcov --output-path coverage/lcov.info
      - name: Upload HTML coverage report
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: coverage-html
          path: coverage/html
          retention-days: 7
      - name: Upload LCOV report
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: coverage-lcov
          path: coverage/lcov.info
          retention-days: 7
      - name: Upload coverage to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: coverage/lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: target/nextest/ci/junit.xml
          report_type: test_results
          token: ${{ secrets.CODECOV_TOKEN }}
