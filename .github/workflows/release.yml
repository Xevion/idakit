# Publishes both crates to crates.io when release-please cuts a GitHub Release. Fetches the IDA
# runtime (as CI does) so `cargo publish`'s verification build links libida and compiles,
# rather than needing `--no-verify`. idakit-sys goes first: idakit depends on it, and its own
# verify build resolves idakit-sys from the registry.

name: release

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    name: Publish to crates.io
    # secrets can't gate a job-level `if`; the runtime var lets forks without it skip cleanly.
    # Both crates share one linked version but cut separate releases, so `published` fires
    # twice; gate on the idakit-sys tag so the paired publish runs exactly once.
    if: ${{ vars.S3_RUNTIME_CONFIGURED == 'true' && startsWith(github.event.release.tag_name, 'idakit-sys-v') }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write # Mint the OIDC token trusted publishing exchanges for a registry token.
    env:
      RUST_BACKTRACE: "1"
      AWS_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
      AWS_REGION: auto
      S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
      S3_BUCKET: ${{ secrets.S3_BUCKET }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      # Uncached: this build gets published, and any PR can write the cache it would restore.
      - name: Install toolchain
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: false
      - name: Fetch IDA runtime
        uses: ./.github/actions/fetch-runtime
        with:
          version: 9.3.260421sp2
          platform: linux-x64
          sdk-tag: v9.3.1-release
      # Trusted publishing: crates.io trades this job's OIDC identity for a token scoped to these
      # crates, revoked when the job ends. Both publishes share it, so one auth step covers them.
      - name: Authenticate with crates.io
        id: auth
        uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1.0.5
      - name: Publish idakit-sys
        run: cargo publish -p idakit-sys --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
      - name: Publish idakit
        run: cargo publish -p idakit --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
