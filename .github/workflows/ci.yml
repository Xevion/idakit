# fmt/doc need no native deps and run on a stock runner. The check matrix builds against a
# real IDA runtime fetched from S3, so it's gated on the S3_* secrets -- forks without them
# skip it and still get fmt + doc.

name: ci

on:
  push:
    branches: [master] # PR branches run via pull_request; avoids the double run
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fmt:
    name: fmt
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # No toolchain action: rust-toolchain.toml pins the version + rustfmt for rustup.
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install toolchain
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
      - name: Check formatting
        run: just fmt-check
      # Broken intra-doc links / bad code blocks, under DOCS_RS so no IDA runtime is needed.
      - name: Lint docs
        run: just doc hermetic
      # README.md is generated from idakit's crate doc (see `just readme`); its intra-doc
      # links resolve to live docs.rs URLs, which cargo-rdme needs a pinned nightly for.
      - name: Install nightly toolchain for README intralinks
        run: cargo rdme install-rust-toolchain-for-intralinks
      - name: Check README is in sync
        run: just readme-check

  check:
    name: check (${{ matrix.platform }} @ ${{ matrix.version }})
    # secrets can't gate a job-level `if`; use a var instead (forks without it skip).
    if: ${{ vars.S3_RUNTIME_CONFIGURED == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: ubuntu-latest, platform: linux-x64, version: 9.3.260421sp2, sdk-tag: v9.3.1-release }
          - { runner: ubuntu-24.04-arm, platform: linux-arm64, version: 9.3.260421sp2, sdk-tag: v9.3.1-release }
          - { runner: macos-15-intel, platform: macos-x64, version: 9.3.260421sp2, sdk-tag: v9.3.1-release }
          - { runner: macos-14, platform: macos-arm64, version: 9.3.260421sp2, sdk-tag: v9.3.1-release }
          - { runner: windows-2022, platform: windows-x64, version: 9.3.260421sp2, sdk-tag: v9.3.1-release }
          # - { runner: ubuntu-latest, platform: linux-x64, version: 9.2.250908, sdk-tag: v9.2.0-release }
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    env:
      RUST_BACKTRACE: "1"
      AWS_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
      AWS_REGION: auto
      S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
      S3_BUCKET: ${{ secrets.S3_BUCKET }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install toolchain
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
      - name: Fetch IDA runtime
        uses: ./.github/actions/fetch-runtime
        with:
          version: ${{ matrix.version }}
          platform: ${{ matrix.platform }}
          sdk-tag: ${{ matrix.sdk-tag }}
      - name: Cache cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Clippy
        run: just clippy
      # clang-tidy-cache (matus-chochlik/ctcache) content-hashes tidy's inputs so an untouched
      # facade skips the work; not on PyPI, so pinned from its commit. `just tidy` uses it only
      # when CTCACHE_DIR is set and the binary is on PATH.
      - name: Install clang-tidy-cache
        if: runner.os != 'Windows'
        run: |
          uv tool install "git+https://github.com/matus-chochlik/ctcache.git@0c7fee26e09ae8a393ed7d56164102da118ab23a"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Cache clang-tidy results
        if: runner.os != 'Windows'
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ runner.temp }}/ctcache
          # actions/cache keys are immutable, so save under a unique per-run key and restore
          # from the closest prior run for this platform.
          key: ctcache-${{ matrix.platform }}-${{ github.run_id }}
          restore-keys: ctcache-${{ matrix.platform }}-
      # compile_commands names a POSIX-style compiler; Windows builds with MSVC, so clang-tidy
      # (and its cache above) only run on the other two OSes.
      - name: Clang-tidy
        if: runner.os != 'Windows'
        env:
          CTCACHE_DIR: ${{ runner.temp }}/ctcache
          CTCACHE_SAVE_OUTPUT: "1"
        run: just tidy
      - name: Accept IDA EULA
        run: cargo run -q -p idakit --example accept_eula
      # Fixtures are host-independent, so every platform fetches the same corpus tier; the
      # exported manifest drives both the corpus matrix and the dedicated tests below.
      - name: Fetch test corpus
        uses: ./.github/actions/fetch-corpus
      - name: Run tests
        run: just ci-test

  # ASan+UBSan and ThreadSanitizer against the real kernel across the FFI boundary, via the
  # roundtrip test. Nightly-only (needs `-Z build-std` for a sanitizer-instrumented std, which
  # the pinned stable toolchain lacks) and Linux-x64-only (unverified elsewhere; Windows has no
  # sanitizer-capable facade compiler here).
  sanitize:
    name: sanitize (${{ matrix.mode }})
    if: ${{ vars.S3_RUNTIME_CONFIGURED == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        mode: [address, thread]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      RUST_BACKTRACE: "1"
      AWS_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
      AWS_REGION: auto
      S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
      S3_BUCKET: ${{ secrets.S3_BUCKET }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install toolchain
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
      - name: Install nightly
        run: rustup toolchain install nightly --component rust-src --profile minimal
      - name: Fetch IDA runtime
        uses: ./.github/actions/fetch-runtime
        with:
          version: 9.3.260421sp2
          platform: linux-x64
          sdk-tag: v9.3.1-release
      - name: Cache cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Accept IDA EULA
        run: cargo run -q -p idakit --example accept_eula
      - name: Fetch test corpus
        uses: ./.github/actions/fetch-corpus
      - name: Run sanitizer
        run: just sanitize ${{ matrix.mode }}

  # Advisory, never gates: Clang's `-Weverything` minus known-noise categories (see `just
  # pedantic`). `-Wold-style-cast` alone surfaces ~185 findings -- a separate refactor, not
  # something a build-tooling change should force or hide.
  pedantic:
    name: pedantic warnings
    if: ${{ vars.S3_RUNTIME_CONFIGURED == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
      AWS_REGION: auto
      S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
      S3_BUCKET: ${{ secrets.S3_BUCKET }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install toolchain
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
      - name: Fetch IDA runtime
        uses: ./.github/actions/fetch-runtime
        with:
          version: 9.3.260421sp2
          platform: linux-x64
          sdk-tag: v9.3.1-release
      - name: Cache cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Pedantic warnings
        run: just pedantic
