# Build and clippy require the proprietary IDA SDK and runtime, which are not
# available on CI runners, so only formatting is checked here.
name: ci

on:
  push:
  pull_request:

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check
