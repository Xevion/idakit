codecov:
  notify:
    wait_for_ci: true

# Informational: both statuses post a number and never fail a check. Coverage is a trend to read;
# the gate is `just check`.
coverage:
  status:
    project:
      default:
        informational: true
        target: auto
        threshold: 2%
        branches:
          - master
    patch:
      default:
        informational: true
  # Test scaffolding, thin forwarders with no branch to take, build-time codegen, and raw extern
  # declarations. The hand-written flag layers in idakit-sys (`*_flags.rs`) stay measured.
  ignore:
    - "crates/idakit/src/corpus.rs"
    - "crates/idakit/src/doctest.rs"
    - "crates/idakit/src/raw.rs"
    - "crates/idakit-sys-codegen/**"
    - "crates/idakit-sys/src/bridge_*.rs"
    - "crates/idakit-sys/src/runtime.rs"
    - "crates/idakit/examples/**"

component_management:
  individual_components:
    - component_id: types
      name: Ctree & Types
      paths:
        - crates/idakit/src/types/**
        - crates/idakit/src/decompiler/**
    - component_id: netnode
      name: Netnode
      paths:
        - crates/idakit/src/netnode/**
    - component_id: instruction
      name: Instructions
      paths:
        - crates/idakit/src/instruction/**
    - component_id: functions
      name: Functions & Frames
      paths:
        - crates/idakit/src/function.rs
        - crates/idakit/src/function/**
        - crates/idakit/src/stack.rs
        - crates/idakit/src/flowchart.rs
    - component_id: reads
      name: Read Surface
      paths:
        - crates/idakit/src/name.rs
        - crates/idakit/src/segment.rs
        - crates/idakit/src/bytes.rs
        - crates/idakit/src/strings.rs
        - crates/idakit/src/search.rs
        - crates/idakit/src/xref.rs
        - crates/idakit/src/data.rs
        - crates/idakit/src/import.rs
        - crates/idakit/src/export.rs
        - crates/idakit/src/meta.rs
    - component_id: kernel
      name: Kernel Thread
      paths:
        - crates/idakit/src/lib.rs
        - crates/idakit/src/kernel.rs
        - crates/idakit/src/claim.rs
        - crates/idakit/src/error.rs
    - component_id: sys
      name: FFI Facade
      paths:
        - crates/idakit-sys/**

comment:
  layout: "condensed_header, diff, components, condensed_footer"
  behavior: default
  require_changes: coverage_drop
  hide_project_coverage: false

github_checks:
  annotations: true
